<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hellcastle Rating (HR)</title>

  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="favicon-64x64.png.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png.png" />
  <meta name="msapplication-TileColor" content="#ef4444" />
  <meta name="theme-color" content="#ef4444" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
    }
    .accent {
      color: #ef4444;
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-4xl mx-auto">
    <header class="mb-8 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-3xl font-black tracking-tighter uppercase italic">
          Hellcastle <span class="accent">Rating</span>
        </h1>
        <p class="text-slate-400 text-sm">Full Match Logs & Archives</p>
      </div>
      <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-4 py-2 rounded-lg text-sm transition-colors flex items-center gap-2">
        ← Back to Dashboard
      </a>
    </header>

    <section class="card p-6 rounded-xl shadow-xl">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
    <h2 class="text-xl font-bold italic uppercase tracking-wider">📜 Match History</h2>
    
    <!-- Added Game Filter Dropdown -->
    <div class="w-full sm:w-64">
      <select id="gameFilter" onchange="renderHistory()" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-sm text-slate-300 focus:outline-none focus:border-red-500">
        <option value="all">All Games</option>
      </select>
    </div>
  </div>

  <div class="overflow-x-auto">
    <!-- Keep your table structure here -->
        <table class="w-full text-left text-sm">
          <thead>
            <tr class="text-slate-500 text-xs uppercase border-b border-slate-700">
              <th class="pb-3">Date</th>
              <th class="pb-3">Game</th>
              <th class="pb-3">Result Summary</th>
            </tr>
          </thead>
          <tbody id="historyBody" class="divide-y divide-slate-800">
            <tr>
              <td colspan="3" class="text-center py-8 text-slate-500">Loading matches from cloud...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbz6_mI1qCeSnJxjH9yxLA0qd7g9ZZgZszWX3em3pRKF2jxKjwLkFcHe7R9LV9I0vbygVg/exec";
let matchHistory = [];

async function loadMatchesFromCloud() {
  try {
    const response = await fetch(SHEET_API_URL);
    const rawMatches = await response.json();
    rawMatches.sort((a, b) => new Date(a.date) - new Date(b.date));
    
    matchHistory = [];
    rawMatches.forEach(match => {
      const sortedResults = [...match.results].sort((a, b) => {
        // 'noscore' and 'high' both put highest score first (1 vs 0 or high values)
        if (match.winCondition === 'high' || match.winCondition === 'noscore') {
          return b.score - a.score;
        }
        return a.score - b.score;
      });

      let summary;
      if (match.winCondition === 'noscore') {
        // Clean display for No Score games
        summary = sortedResults.map((p, idx) => idx === 0 ? `🏆 ${p.name}` : p.name).join(', ');
      } else {
        summary = sortedResults.map(p => `${p.name} (${p.score})`).join(', ');
      }

      matchHistory.unshift({
        date: match.date,
        game: match.gameName || 'Unknown Game',
        summary
      });
    });

    populateFilterDropdown();
    renderHistory();
  } catch (err) {
    console.error('Cloud fetch failed:', err);
    document.getElementById('historyBody').innerHTML = `
      <tr>
        <td colspan="3" class="text-center py-8 text-red-400">
          Error syncing storage online.
        </td>
      </tr>`;
  }
}

// Dynamically creates options in the dropdown based on matches loaded
function populateFilterDropdown() {
  const filter = document.getElementById('gameFilter');
  const uniqueGames = [...new Set(matchHistory.map(item => item.game))].sort();
  
  // Keep the 'All Games' option and add the unique ones
  filter.innerHTML = '<option value="all">All Games</option>' + 
    uniqueGames.map(game => `<option value="${game}">${game}</option>`).join('');
}

function renderHistory() {
  const tbody = document.getElementById('historyBody');
  const selectedGame = document.getElementById('gameFilter').value;

  // Filter list based on selected dropdown value
  const filteredMatches = selectedGame === 'all' 
    ? matchHistory 
    : matchHistory.filter(item => item.game === selectedGame);

  if (filteredMatches.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-slate-500">No matches found.</td></tr>';
    return;
  }

  tbody.innerHTML = filteredMatches.map(item => `
    <tr class="hover:bg-slate-800/50 transition-colors">
      <td class="py-4 font-mono text-xs text-slate-400">${item.date}</td>
      <td class="py-4 font-bold text-slate-300">${item.game}</td>
      <td class="py-4 text-slate-400 text-xs">${item.summary}</td>
    </tr>
  `).join('');
}

loadMatchesFromCloud();
    loadMatchesFromCloud();
  </script>
</body>
</html>
